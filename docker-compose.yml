version: '3.8'

services:
  # MariaDB Database
  mariadb:
    image: mariadb:11
    container_name: chatinterface-mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret_password}
      MYSQL_DATABASE: ${DB_NAME:-chatinterface}
      MYSQL_USER: ${DB_USER:-chatapp}
      MYSQL_PASSWORD: ${DB_PASSWORD:-chatapp_secret}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - chatinterface-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chatinterface-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USER: ${DB_USER:-chatapp}
      DB_PASSWORD: ${DB_PASSWORD:-chatapp_secret}
      DB_NAME: ${DB_NAME:-chatinterface}
      JWT_SECRET: ${JWT_SECRET:-operator-chat-secret-key-12345}
      LLAMA_BASE_URL: ${LLAMA_BASE_URL:-http://localhost:8080}
      LLAMA_MODEL: ${LLAMA_MODEL:-claude-3-5-sonnet-20241022}
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL:-http://localhost:8080}
      SEARXNG_SAFE_SEARCH: ${SEARXNG_SAFE_SEARCH:-1}
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    volumes:
      - backend_data:/app/data
      - backend_sandboxes:/app/sandboxes
    networks:
      - chatinterface-network
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      start_period: 40s
      retries: 3
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # Frontend Web Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chatinterface-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - chatinterface-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  # Optional: phpMyAdmin for database management
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: chatinterface-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret_password}
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
    networks:
      - chatinterface-network
    depends_on:
      mariadb:
        condition: service_healthy
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
    profiles:
      - dev

volumes:
  mariadb_data:
    driver: local
  backend_data:
    driver: local
  backend_sandboxes:
    driver: local

networks:
  chatinterface-network:
    driver: bridge
